<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="exp_3.css">
</head>
<body>
    <div class="container">
        <h1 id="main-heading">Welcome to JavaScript Lab</h1>
        <input type="text" id="heading-input" placeholder="Enter new heading text">
        <div class="button-group">
            <button onclick="changeHeading()">Change Heading</button>
            <button onclick="changeBackground()">Change Background</button>
            <button onclick="increaseFontSize()">Increase Font Size</button>
            <button onclick="toggleParagraph()">Show/Hide Paragraph</button>
            <button onclick="resetPage()">Reset</button>
        </div>
        <p id="sample-text">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>
    <script src="exp3.js"></script>
</body>
</html>
