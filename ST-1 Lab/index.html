<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="main-heading">JavaScript Events and Dom Manipulation</h1>
        <input type="text" id="heading-input" placeholder="Insert new heading">
        <div class="button-group">
            <button onclick="insertNew()">Insert New</button>
            <button onclick="increaseFontSize()">Increase Font Size</button>
            <button onclick="toggleParagraph()">Show/Hide Paragraph</button>
            <button onclick="resetPage()">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
